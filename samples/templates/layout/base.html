<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Dolce Store{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    {% load static %}
    <link rel="stylesheet" href="{% static 'css_store/style.css' %}">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-danger fixed-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">DOLCE STORE</a>

            <div class="ms-auto">
                <a href="{% url 'cart' %}" class="btn btn-warning text-dark fw-bold">
                  <!-- Має бути так -->
                🛒 Кошик ({{ cart_total_quantity|default:0 }})
                </a>
            </div>
        </div>
    </nav>

    <div class="container" style="margin-top: 80px;">
        <div class="mb-4">
            <div class="d-flex justify-content-between align-items-center">
                <a href="{% url 'add' %}" class="btn btn-primary shadow-sm">➕ Додати нове оголошення</a>
            </div>

            <hr>

            <nav class="nav">
                <a class="nav-link ps-0 fw-bold" href="{% url 'index' %}">На головну</a>
                {% for rubric in rubrics %}
                    <a class="nav-link" href="{% url 'by_rubric' rubric.pk %}">{{ rubric.name }}</a>
                {% endfor %}
            </nav>
        </div>

        <hr>

        {% block content %}
        {% endblock %}
    </div>

    <footer class="container mt-5 py-4 border-top text-center text-muted">
        <p>© 2026 Наш Магазин Dolce Store</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

   <div id="imageViewer" style="display: none; position: fixed; z-index: 9999; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); align-items: center; justify-content: center; cursor: zoom-out;">
    <img id="fullImage" src="" style="max-width: 90%; max-height: 90%; border: 3px solid white; border-radius: 5px; box-shadow: 0 0 20px rgba(0,0,0,0.5);">
    <span style="position: absolute; top: 20px; right: 30px; color: white; font-size: 40px; font-weight: bold; cursor: pointer;">&times;</span>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const viewer = document.getElementById('imageViewer');
        const fullImg = document.getElementById('fullImage');
        const zoomLinks = document.querySelectorAll('.img-zoom-link');

        // Відкриття при кліку
        zoomLinks.forEach(link => {
            link.addEventListener('click', function(e) {
                e.preventDefault(); // Забороняємо перехід за посиланням
                fullImg.src = this.getAttribute('href');
                viewer.style.display = 'flex';
            });
        });

        // Закриття при кліку на фон
        viewer.addEventListener('click', function() {
            viewer.style.display = 'none';
            fullImg.src = ''; // Очищуємо шлях
        });
    });
</script>
</body>
</html>
